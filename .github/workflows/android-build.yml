name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Build web assets
        working-directory: artifacts/simsar
        run: pnpm exec vite build --config vite.config.capacitor.ts

      - name: Install Capacitor CLI globally
        run: npm install -g @capacitor/cli@6

      - name: Add Android platform
        working-directory: artifacts/simsar
        run: npx cap add android

      - name: Sync Capacitor
        working-directory: artifacts/simsar
        run: npx cap sync android

      - name: Make Gradle executable
        working-directory: artifacts/simsar/android
        run: chmod +x gradlew

      - name: Build APK
        working-directory: artifacts/simsar/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: samsar-debug-apk
          path: artifacts/simsar/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
