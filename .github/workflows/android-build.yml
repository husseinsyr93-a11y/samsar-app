name: Build Android APK & AAB

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-android:
    name: Build Release APK & AAB
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ────────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 3. pnpm ───────────────────────────────────────────────────────────────
      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install all workspace dependencies
        run: pnpm install --frozen-lockfile

      # ── 4. Java 17 (required for Android SDK & Gradle) ───────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── 5. Android SDK ────────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;26.3.11579264" \
            --sdk_root=$ANDROID_SDK_ROOT

      # ── 6. Build the web (Vite) app ───────────────────────────────────────────
      - name: Build web assets for Capacitor
        working-directory: artifacts/simsar
        env:
          NODE_ENV: production
          VITE_API_BASE_URL: https://samsar.replit.app/api
        run: pnpm exec vite build --config vite.config.capacitor.ts

      # ── 7. Capacitor — add Android platform ───────────────────────────────────
      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli@latest

      - name: Capacitor init (if needed)
        working-directory: artifacts/simsar
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "android/ already exists, skipping cap add"
          fi

      - name: Capacitor sync
        working-directory: artifacts/simsar
        run: npx cap sync android

      # ── 8. Patch Android manifest & build.gradle ─────────────────────────────
      - name: Patch AndroidManifest.xml — permissions
        working-directory: artifacts/simsar/android/app/src/main
        run: |
          # Add permissions before </manifest>
          sed -i 's|</manifest>|    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" />\n</manifest>|' AndroidManifest.xml || true

      - name: Patch app/build.gradle — version & SDK
        working-directory: artifacts/simsar/android/app
        run: |
          sed -i 's/versionCode .*/versionCode 1/' build.gradle || true
          sed -i 's/versionName .*/versionName "1.0.0"/' build.gradle || true
          sed -i 's/minSdkVersion .*/minSdkVersion 24/' build.gradle || true
          sed -i 's/targetSdkVersion .*/targetSdkVersion 35/' build.gradle || true
          sed -i 's/compileSdkVersion .*/compileSdkVersion 35/' build.gradle || true
          cat build.gradle

      # ── 9. Gradle wrapper permissions ────────────────────────────────────────
      - name: Make Gradle wrapper executable
        working-directory: artifacts/simsar/android
        run: chmod +x gradlew

      # ── 10. Build unsigned release APK ───────────────────────────────────────
      - name: Build Release APK (unsigned)
        working-directory: artifacts/simsar/android
        run: |
          ./gradlew assembleRelease \
            -Pandroid.enableJetifier=true \
            --stacktrace \
            --no-daemon

      # ── 11. Build Release AAB (for Google Play) ───────────────────────────────
      - name: Build Release AAB (unsigned)
        working-directory: artifacts/simsar/android
        run: |
          ./gradlew bundleRelease \
            -Pandroid.enableJetifier=true \
            --stacktrace \
            --no-daemon

      # ── 12. Sign APK with release keystore (optional — if secrets are set) ───
      - name: Sign APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/samsar-release.jks
          $ANDROID_SDK_ROOT/build-tools/35.0.0/apksigner sign \
            --ks /tmp/samsar-release.jks \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
            --out artifacts/simsar/android/app/build/outputs/apk/release/samsar-release-signed.apk \
            artifacts/simsar/android/app/build/outputs/apk/release/app-release-unsigned.apk

      # ── 13. Collect output files ──────────────────────────────────────────────
      - name: Collect build outputs
        run: |
          mkdir -p build-outputs
          find artifacts/simsar/android/app/build/outputs -name "*.apk" -exec cp {} build-outputs/ \;
          find artifacts/simsar/android/app/build/outputs -name "*.aab" -exec cp {} build-outputs/ \;
          ls -lh build-outputs/

      # ── 14. Upload APK artifact ───────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: samsar-apk-${{ github.run_number }}
          path: |
            build-outputs/*.apk
          retention-days: 30
          if-no-files-found: warn

      # ── 15. Upload AAB artifact ───────────────────────────────────────────────
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: samsar-aab-${{ github.run_number }}
          path: |
            build-outputs/*.aab
          retention-days: 30
          if-no-files-found: warn

      # ── 16. Build summary ────────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          echo "## سمسار — Android Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for f in build-outputs/*; do
            echo "| $(basename $f) | $(du -sh $f | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          done || echo "No build outputs found" >> $GITHUB_STEP_SUMMARY
