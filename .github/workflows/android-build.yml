name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform tools
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Build web assets
        working-directory: artifacts/simsar
        env:
          NODE_ENV: production
          VITE_API_BASE_URL: https://samsar.replit.app/api
        run: pnpm exec vite build --config vite.config.capacitor.ts

      - name: Add Android platform
        working-directory: artifacts/simsar
        run: node_modules/.bin/cap add android

      - name: Sync Capacitor
        working-directory: artifacts/simsar
        run: node_modules/.bin/cap sync android

      - name: Make Gradle executable
        working-directory: artifacts/simsar/android
        run: chmod +x gradlew

      - name: Build Release APK
        working-directory: artifacts/simsar/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Build Debug APK
        working-directory: artifacts/simsar/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: samsar-debug-apk
          path: artifacts/simsar/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: samsar-release-apk
          path: artifacts/simsar/android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
          if-no-files-found: warn
